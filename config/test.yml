INFO_LEVEL: INFO # DEBUG, INFO, ERROR

collect:
  task_name: null
  type: test_robot
  save_dir: ./data/
  save_format: hdf5
  start_episode: 0
  num_episode: 100
  save_freq: 30  # in Hz
  move_check: true

robot:
  use_node: true
  
  type: dual_test_robot
  init_qpos: 
    left_arm: [0, 0, 0, 0, 0, 0]
    left_gripper: 1.0
    right_arm: [0, 0, 0, 0, 0, 0]
    right_gripper: 1.0
  control_mode: position